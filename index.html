<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WatchNoveen — شاهد مع من تحب</title>
  <meta name="description" content="شاهد الأفلام والمسلسلات مع أصدقائك في أي مكان بمزامنة فورية" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:    #6c63ff;
      --accent-90: rgba(108,99,255,0.9);
      --accent-60: rgba(108,99,255,0.6);
      --accent-40: rgba(108,99,255,0.4);
      --accent-20: rgba(108,99,255,0.2);
      --accent-10: rgba(108,99,255,0.1);
      --accent-5:  rgba(108,99,255,0.05);
      --green:     #22c55e;
      --red:       #ef4444;
      --bg:        #080810;
      --card:      rgba(15,15,26,0.8);
      --border:    rgba(255,255,255,0.08);
      --border-hi: rgba(255,255,255,0.14);
      --text:      #fff;
      --text-60:   rgba(255,255,255,0.6);
      --text-40:   rgba(255,255,255,0.4);
      --text-20:   rgba(255,255,255,0.2);
      --text-10:   rgba(255,255,255,0.1);
      --text-5:    rgba(255,255,255,0.05);
      --shadow:    0 24px 48px rgba(0,0,0,0.6);
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
      overflow-x: hidden; -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-20); border-radius: 4px; }

    /* Background */
    #bg-mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(108,99,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(108,99,255,0.08) 0%, transparent 60%);
    }

    /* Particles */
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .particle { position: absolute; border-radius: 50%; background: var(--accent-20); animation: floatUp linear infinite; }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-100vh) scale(0.5); }
    }

    /* Glass */
    .glass {
      background: var(--card);
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      border: 1px solid var(--border);
      box-shadow: var(--shadow), inset 0 1px 0 var(--text-5);
    }

    .glass-input {
      background: var(--text-5); border: 1px solid var(--border);
      border-radius: 14px; padding: 13px 16px; color: var(--text);
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.25s, box-shadow 0.25s; width: 100%;
    }
    .glass-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-10); }
    .glass-input::placeholder { color: var(--text-40); font-family: 'Noto Sans Arabic', sans-serif; }

    /* Buttons */
    .btn-primary {
      background: var(--accent); color: #fff; font-weight: 700;
      padding: 13px 32px; border-radius: 14px; border: none; cursor: pointer;
      transition: background 0.25s, box-shadow 0.25s, transform 0.15s;
      box-shadow: 0 8px 28px var(--accent-40);
      font-family: 'Noto Sans Arabic', sans-serif; font-size: 15px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary:hover { background: var(--accent-90); box-shadow: 0 12px 40px var(--accent-60); transform: translateY(-2px); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      background: var(--text-5); color: var(--text); font-weight: 600;
      padding: 13px 32px; border-radius: 14px; border: 1px solid var(--border-hi);
      cursor: pointer; transition: background 0.25s, transform 0.15s;
      font-family: 'Noto Sans Arabic', sans-serif; font-size: 15px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-secondary:hover { background: var(--text-10); }
    .btn-secondary:active { transform: scale(0.97); }

    /* Screens */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; z-index: 10;
      animation: screenIn 0.4s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes screenIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
    .screen.hidden { display: none !important; }

    /* Landing */
    .logo-wrap { position: relative; text-align: center; margin-bottom: 52px; }
    .logo-glow {
      position: absolute; inset: -40px;
      background: radial-gradient(ellipse at 50% 60%, var(--accent-40) 0%, transparent 70%);
      filter: blur(40px); pointer-events: none;
    }
    .logo-text {
      font-size: clamp(52px,11vw,100px); font-weight: 900;
      letter-spacing: -4px; line-height: 1; position: relative; user-select: none;
    }
    .logo-text .accent { color: var(--accent); }
    .logo-under {
      margin-top: 10px; position: relative;
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .logo-line { flex: 1; max-width: 60px; height: 1px; background: var(--border-hi); }
    .logo-tagline { font-size: 15px; color: var(--text-60); font-family: 'Noto Sans Arabic', sans-serif; font-weight: 500; white-space: nowrap; }

    .landing-btns { display: flex; gap: 14px; width: 100%; max-width: 400px; flex-wrap: wrap; }
    .landing-btns button { flex: 1; min-width: 150px; justify-content: center; }

    .landing-stats { position: absolute; bottom: 28px; display: flex; gap: 32px; align-items: center; }
    .stat-item { text-align: center; }
    .stat-num { font-size: 18px; font-weight: 800; color: var(--accent); line-height: 1; }
    .stat-lbl { font-size: 10px; color: var(--text-40); font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px; }
    .stat-div { width: 1px; height: 28px; background: var(--border-hi); }

    /* Form */
    .form-card { width: 100%; max-width: 440px; border-radius: 28px; padding: 36px 32px; }
    .form-card h2 { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 32px; font-family: 'Noto Sans Arabic', sans-serif; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 11px; color: var(--text-40);
      margin-bottom: 8px; font-family: 'Noto Sans Arabic', sans-serif;
      padding: 0 4px; letter-spacing: 0.5px; font-weight: 600; text-transform: uppercase;
    }
    .code-display { display: flex; gap: 8px; align-items: center; }
    .code-box {
      flex: 1; text-align: center; font-family: 'Inter', monospace;
      font-size: 26px; letter-spacing: 8px; font-weight: 800;
      padding: 14px; border-radius: 14px;
      background: var(--accent-5); border: 2px dashed rgba(108,99,255,0.25); color: var(--accent);
    }
    .copy-btn {
      width: 50px; height: 50px; border-radius: 14px;
      background: var(--text-5); border: 1px solid var(--border-hi);
      color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s; flex-shrink: 0;
    }
    .copy-btn:hover { background: var(--accent); color: #fff; }
    .back-link {
      display: block; text-align: center; margin-top: 18px;
      color: var(--text-40); font-size: 13px; cursor: pointer;
      transition: color 0.2s; font-family: 'Noto Sans Arabic', sans-serif;
      background: none; border: none; width: 100%;
    }
    .back-link:hover { color: var(--text); }

    /* Watch screen */
    #watch-screen {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      z-index: 10; padding: 0;
      animation: screenIn 0.4s cubic-bezier(0.22,1,0.36,1);
    }
    #watch-screen.hidden { display: none !important; }

    .topbar {
      border-top: none; border-left: none; border-right: none; border-radius: 0;
      padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .topbar-brand { display: flex; align-items: center; gap: 12px; }
    .topbar-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--accent-20); border: 1px solid rgba(108,99,255,0.3);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .topbar-title { font-weight: 800; font-size: 14px; }
    .topbar-sub { display: flex; align-items: center; gap: 6px; font-size: 10px; text-transform: uppercase; font-weight: 700; color: var(--text-40); margin-top: 1px; }
    .pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.8); } }

    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .sync-badge {
      padding: 5px 13px; border-radius: 999px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; display: flex; align-items: center; gap: 6px; transition: all 0.35s;
    }
    .sync-badge.synced  { background: rgba(34,197,94,0.1); color: var(--green); }
    .sync-badge.syncing { background: var(--accent-10); color: var(--accent); }

    .room-code-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px; border-radius: 10px; cursor: pointer;
      background: var(--text-5); border: 1px solid var(--border-hi);
      color: var(--accent); transition: background 0.2s;
      font-family: 'Inter', monospace; font-size: 13px; letter-spacing: 3px; font-weight: 800;
    }
    .room-code-btn:hover { background: var(--accent-10); }

    .player-area { flex: 1; padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 10px; overflow: hidden; min-height: 0; }
    .player-wrapper { flex: 1; border-radius: 22px; overflow: hidden; position: relative; min-height: 0; background: #000; }
    .player-wrapper video { width: 100%; height: 100%; object-fit: contain; background: #000; display: block; }
    .player-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
    .play-big-btn {
      width: 84px; height: 84px; border-radius: 50%;
      background: var(--accent-20); border: 1px solid rgba(108,99,255,0.35);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.4s; backdrop-filter: blur(8px);
    }
    .play-big-btn:hover { background: var(--accent); transform: scale(1.12); box-shadow: 0 0 40px var(--accent-60); }
    .placeholder-text { font-size: 14px; color: var(--text-40); font-family: 'Noto Sans Arabic', sans-serif; text-align: center; padding: 0 24px; max-width: 360px; line-height: 1.6; }

    .loading-overlay {
      position: absolute; inset: 0; background: rgba(8,8,16,0.92);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 5; border-radius: 22px; backdrop-filter: blur(8px);
    }
    .loading-overlay.hidden { display: none; }
    .spinner { width: 42px; height: 42px; border-radius: 50%; border: 3px solid var(--border-hi); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-60); font-family: 'Noto Sans Arabic', sans-serif; text-align: center; }
    .loading-progress { font-size: 11px; color: var(--accent); font-family: 'Inter', monospace; }

    .controls-bar { border-radius: 18px; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .progress-wrap { width: 100%; height: 5px; background: var(--text-10); border-radius: 999px; cursor: pointer; position: relative; transition: height 0.2s; }
    .progress-wrap:hover { height: 7px; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.25s; position: relative; }
    .progress-fill::after {
      content: ''; position: absolute; right: -5px; top: 50%;
      transform: translateY(-50%) scale(0);
      width: 12px; height: 12px; border-radius: 50%; background: #fff; transition: transform 0.2s;
    }
    .progress-wrap:hover .progress-fill::after { transform: translateY(-50%) scale(1); }

    .controls-row { display: flex; align-items: center; justify-content: space-between; }
    .controls-left  { display: flex; align-items: center; gap: 14px; }
    .controls-right { display: flex; align-items: center; gap: 12px; padding-left: 12px; border-left: 1px solid var(--border-hi); }
    .ctrl-btn { background: none; border: none; color: var(--text-60); cursor: pointer; display: flex; align-items: center; transition: color 0.2s, transform 0.15s; padding: 4px; border-radius: 6px; }
    .ctrl-btn:hover { color: var(--text); transform: scale(1.1); }
    .time-display { font-size: 12px; font-family: 'Inter', monospace; color: var(--text-40); white-space: nowrap; }
    .volume-wrap { display: flex; align-items: center; gap: 8px; }
    .volume-slider { width: 68px; height: 4px; background: var(--text-10); border-radius: 999px; appearance: none; -webkit-appearance: none; cursor: pointer; outline: none; }
    .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--text); cursor: pointer; }

    /* Chat */
    #chat-container { position: fixed; bottom: 24px; right: 24px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
    #chat-panel { width: 300px; height: 420px; border-radius: 24px; padding: 16px; display: flex; flex-direction: column; transform-origin: bottom right; transition: opacity 0.4s, transform 0.3s; }
    #chat-panel.hidden { display: none !important; }
    #chat-panel.faded  { opacity: 0.15; pointer-events: none; }

    .chat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border-hi); }
    .chat-header-title { font-weight: 700; font-size: 13px; font-family: 'Noto Sans Arabic', sans-serif; }
    .online-indicator  { display: flex; align-items: center; gap: 6px; }
    .online-dot        { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    .online-count      { font-size: 10px; font-weight: 700; color: var(--text-40); }

    .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-left: 2px; direction: rtl; }
    .msg-system { text-align: center; font-size: 11px; color: var(--text-40); font-family: 'Noto Sans Arabic', sans-serif; line-height: 1.5; }
    .msg-wrap { display: flex; flex-direction: column; gap: 3px; }
    .msg-meta { display: flex; align-items: center; gap: 5px; }
    .msg-user { font-size: 10px; font-weight: 700; color: var(--accent); }
    .msg-time { font-size: 9px; color: var(--text-20); }
    .msg-bubble { padding: 8px 12px; border-radius: 16px; font-size: 13px; max-width: 86%; word-break: break-word; line-height: 1.5; }
    .msg-bubble.mine  { background: var(--accent); color: #fff; border-top-right-radius: 5px; align-self: flex-start; }
    .msg-bubble.other { background: var(--text-5); border: 1px solid var(--border); border-top-left-radius: 5px; align-self: flex-end; }

    .chat-input-wrap { margin-top: 10px; display: flex; gap: 8px; }
    .chat-input {
      flex: 1; background: var(--text-5); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px; color: var(--text);
      font-size: 13px; font-family: 'Noto Sans Arabic', sans-serif;
      outline: none; transition: border-color 0.25s; direction: rtl;
    }
    .chat-input:focus { border-color: var(--accent); }
    .chat-input::placeholder { color: var(--text-40); }
    .send-btn {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      background: var(--accent); border: none; color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px var(--accent-40); }

    .chat-toggle { width: 52px; height: 52px; border-radius: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; transition: all 0.3s; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .chat-toggle.open   { background: rgba(255,255,255,0.95); color: var(--bg); }
    .chat-toggle.closed { background: var(--accent); color: #fff; }
    .chat-toggle.closed:hover { transform: scale(1.08); box-shadow: 0 8px 32px var(--accent-60); }

    .unread-badge {
      position: absolute; top: -6px; right: -6px;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--red); color: #fff; font-size: 10px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      animation: badgePop 0.3s cubic-bezier(0.22,1,0.36,1);
    }
    .unread-badge.hidden { display: none; }
    @keyframes badgePop { from { transform: scale(0); } to { transform: scale(1); } }

    /* Toast */
    #toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(15,15,26,0.9); backdrop-filter: blur(24px);
      border: 1px solid var(--border-hi); border-radius: 12px;
      padding: 10px 22px; font-size: 13px; font-family: 'Noto Sans Arabic', sans-serif;
      z-index: 999; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    #toast.hidden { opacity: 0; transform: translateX(-50%) translateY(-6px); }

    /* Responsive */
    @media (max-width: 600px) {
      .landing-btns { flex-direction: column; }
      .form-card { padding: 28px 20px; border-radius: 22px; }
      #chat-panel { width: 280px; height: 370px; }
      #chat-container { right: 12px; bottom: 12px; }
      .topbar { padding: 10px 12px; }
      .controls-bar { padding: 10px 12px; }
      .volume-wrap { display: none; }
      .topbar-title { display: none; }
      .landing-stats { gap: 20px; }
    }

    svg { display: block; }
  </style>
</head>
<body>

<div id="bg-mesh"></div>
<div id="particles"></div>
<div id="toast" class="hidden"></div>

<!-- LANDING -->
<div id="landing-screen" class="screen">
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="logo-text">Watch<span class="accent">Noveen</span></div>
    <div class="logo-under">
      <div class="logo-line"></div>
      <span class="logo-tagline">شاهد مع من تحب، أينما كان</span>
      <div class="logo-line"></div>
    </div>
  </div>
  <div class="landing-btns">
    <button class="btn-primary" onclick="goCreate()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      إنشاء غرفة
    </button>
    <button class="btn-secondary" onclick="goJoin()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      الانضمام لغرفة
    </button>
  </div>
  <div class="landing-stats">
    <div class="stat-item"><div class="stat-num">&#8734;</div><div class="stat-lbl">مزامنة فورية</div></div>
    <div class="stat-div"></div>
    <div class="stat-item"><div class="stat-num">P2P</div><div class="stat-lbl">WebTorrent</div></div>
    <div class="stat-div"></div>
    <div class="stat-item"><div class="stat-num">2026</div><div class="stat-lbl">WatchNoveen</div></div>
  </div>
</div>

<!-- CREATE -->
<div id="create-screen" class="screen hidden">
  <div class="form-card glass">
    <h2>&#127916; تجهيز الغرفة</h2>
    <div class="form-group">
      <label>كود الغرفة</label>
      <div class="code-display">
        <div class="code-box" id="room-code-display">------</div>
        <button class="copy-btn" onclick="copyCode()" title="نسخ الكود">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label>اسمك</label>
      <input id="create-username" type="text" placeholder="أدخل اسمك هنا..." class="glass-input" />
    </div>
    <div class="form-group">
      <label>رابط الفيديو</label>
      <input id="create-url" type="text" placeholder="magnet:?xt=urn:... أو رابط .mp4 مباشر" class="glass-input" dir="ltr" />
    </div>
    <button class="btn-primary" style="width:100%;justify-content:center;" onclick="startWatching()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      ابدأ المشاهدة
    </button>
    <button class="back-link" onclick="goLanding()">&#8592; العودة للخلف</button>
  </div>
</div>

<!-- JOIN -->
<div id="join-screen" class="screen hidden">
  <div class="form-card glass">
    <h2>&#128279; الانضمام للغرفة</h2>
    <div class="form-group">
      <label>كود الغرفة</label>
      <input id="join-code" type="text" placeholder="أدخل الكود المكوّن من 6 رموز" class="glass-input"
        style="text-align:center;font-family:'Inter',monospace;letter-spacing:6px;font-size:20px;text-transform:uppercase;"
        maxlength="6" dir="ltr" />
    </div>
    <div class="form-group">
      <label>اسمك</label>
      <input id="join-username" type="text" placeholder="أدخل اسمك هنا..." class="glass-input" />
    </div>
    <button class="btn-primary" style="width:100%;justify-content:center;" onclick="joinRoom()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      انضم الآن
    </button>
    <button class="back-link" onclick="goLanding()">&#8592; العودة للخلف</button>
  </div>
</div>

<!-- WATCH -->
<div id="watch-screen" class="hidden">
  <div class="topbar glass">
    <div class="topbar-brand">
      <div class="topbar-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="var(--accent)"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
      <div>
        <div class="topbar-title">WatchNoveen</div>
        <div class="topbar-sub"><div class="pulse-dot"></div><span>Live Sync</span></div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="sync-badge synced" id="sync-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span id="sync-text">متزامن</span>
      </div>
      <button class="room-code-btn" onclick="copyCode()">
        <span id="watch-code-text">------</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
    </div>
  </div>

  <div class="player-area">
    <div class="player-wrapper glass">
      <div class="loading-overlay hidden" id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">جاري تحميل الفيديو...</div>
        <div class="loading-progress" id="loading-progress"></div>
      </div>
      <video id="video-player" style="display:none;" playsinline></video>
      <div class="player-placeholder" id="player-placeholder">
        <div class="play-big-btn" onclick="startVideo()">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
        <p class="placeholder-text" id="placeholder-text">جاري التحضير...</p>
      </div>
    </div>

    <div class="controls-bar glass">
      <div class="progress-wrap" id="progress-wrap" onclick="seekVideo(event)">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="controls-row">
        <div class="controls-left">
          <button class="ctrl-btn" onclick="togglePlay()" id="play-pause-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
          <div class="volume-wrap">
            <button class="ctrl-btn" onclick="toggleMute()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="volume-icon">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
            </button>
            <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)" />
          </div>
          <span class="time-display" id="time-display">0:00 / 0:00</span>
        </div>
        <div class="controls-right">
          <button class="ctrl-btn" onclick="toggleFullscreen()" title="ملء الشاشة">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chat-container" style="display:none;">
  <div id="chat-panel" class="glass hidden">
    <div class="chat-header">
      <span class="chat-header-title">الدردشة</span>
      <div class="online-indicator">
        <div class="online-dot"></div>
        <span class="online-count" id="online-count">1 ONLINE</span>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-wrap">
      <input type="text" id="chat-input" class="chat-input" placeholder="اكتب رسالتك..."
        onkeydown="if(event.key==='Enter')sendChat()" onfocus="resetChatFade()" />
      <button class="send-btn" onclick="sendChat()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transform:rotate(210deg)">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
  <div style="position:relative;">
    <button class="chat-toggle closed" id="chat-toggle" onclick="toggleChat()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
    <div class="unread-badge hidden" id="unread-badge">0</div>
  </div>
</div>

<script>
// ════ STATE ════
let currentRoom   = null;
let myUsername    = '';
let myRole        = '';
let videoUrl      = '';
let socket        = null;
let torrentClient = null;
let videoEl       = null;
let isSyncing     = false;
let chatFadeTimer = null;
let onlineUsers   = 1;
let unreadCount   = 0;
let chatOpen      = false;

// ════ SERVER URL — السطر الوحيد الذي تغيّره عند الحاجة ════
// Render (افتراضي جاهز): https://watchnoveen-server.onrender.com
// ngrok (مؤقت محلي):    https://XXXX.ngrok-free.app
const SERVER_URL = 'https://watchnoveen-server.onrender.com';

// ════ PARTICLES ════
(function() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = 2 + Math.random() * 5;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:-10px;animation-duration:${12+Math.random()*20}s;animation-delay:${Math.random()*12}s;opacity:0;`;
    c.appendChild(p);
  }
})();

// ════ NAVIGATION ════
function showScreen(id) {
  ['landing-screen','create-screen','join-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById('watch-screen').classList.add('hidden');
  document.getElementById('chat-container').style.display = 'none';
  if (id === 'watch') {
    document.getElementById('watch-screen').classList.remove('hidden');
    document.getElementById('chat-container').style.display = 'flex';
  } else {
    document.getElementById(id + '-screen').classList.remove('hidden');
  }
}

function goLanding() { showScreen('landing'); }
function goCreate() {
  const code = generateCode();
  currentRoom = code;
  document.getElementById('room-code-display').textContent = code;
  showScreen('create');
}
function goJoin() { showScreen('join'); }

// ════ CODE ════
function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let r = '';
  for (let i = 0; i < 6; i++) r += chars[Math.floor(Math.random() * chars.length)];
  return r;
}
function copyCode() {
  if (!currentRoom) return;
  navigator.clipboard.writeText(currentRoom).catch(() => {});
  showToast('تم نسخ كود الغرفة: ' + currentRoom);
}

// ════ START (HOST) ════
function startWatching() {
  const username = document.getElementById('create-username').value.trim();
  const url      = document.getElementById('create-url').value.trim();
  if (!username) { showToast('الرجاء إدخال اسمك'); return; }
  if (!url)      { showToast('الرجاء إدخال رابط الفيديو'); return; }
  myUsername = username; myRole = 'host'; videoUrl = url;
  document.getElementById('watch-code-text').textContent = currentRoom;
  showScreen('watch');
  addSystemMsg('أهلاً بك يا ' + myUsername + '! الغرفة جاهزة');
  addSystemMsg('كود الغرفة: ' + currentRoom + ' — شاركه مع صديقك');
  initSocket(); initVideo();
}

// ════ JOIN (GUEST) ════
function joinRoom() {
  const code     = document.getElementById('join-code').value.trim().toUpperCase();
  const username = document.getElementById('join-username').value.trim();
  if (!code || code.length < 6) { showToast('الرجاء إدخال كود الغرفة'); return; }
  if (!username) { showToast('الرجاء إدخال اسمك'); return; }
  myUsername = username; myRole = 'guest'; currentRoom = code;
  document.getElementById('watch-code-text').textContent = currentRoom;
  showScreen('watch');
  addSystemMsg('انضممت للغرفة ' + currentRoom);
  document.getElementById('placeholder-text').textContent = 'في انتظار رابط الفيديو من المضيف...';
  initSocket();
}

// ════ SOCKET ════
function initSocket() {
  try {
    socket = io(SERVER_URL, { transports: ['websocket','polling'], timeout: 10000, reconnectionAttempts: 5 });

    socket.on('connect', () => {
      socket.emit('join-room', { room: currentRoom, username: myUsername, role: myRole, videoUrl });
      showToast('متصل بالسيرفر');
    });
    socket.on('connect_error', () => {
      showToast('تعذر الاتصال بالسيرفر');
      setSyncStatus('syncing');
    });
    socket.on('reconnect', () => {
      showToast('أُعيد الاتصال');
      setSyncStatus('synced');
      socket.emit('join-room', { room: currentRoom, username: myUsername, role: myRole, videoUrl });
    });
    socket.on('room-state', (data) => {
      onlineUsers = data.users || 1;
      document.getElementById('online-count').textContent = onlineUsers + ' ONLINE';
      if (data.videoUrl && !videoUrl) { videoUrl = data.videoUrl; initVideo(); }
    });
    socket.on('user-joined', (data) => {
      onlineUsers++;
      document.getElementById('online-count').textContent = onlineUsers + ' ONLINE';
      addSystemMsg(data.username + ' انضم للغرفة!');
      showToast(data.username + ' انضم!');
      if (myRole === 'host' && videoEl)
        socket.emit('sync-time', { room: currentRoom, time: videoEl.currentTime, playing: !videoEl.paused });
    });
    socket.on('user-left', (data) => {
      onlineUsers = Math.max(1, onlineUsers - 1);
      document.getElementById('online-count').textContent = onlineUsers + ' ONLINE';
      addSystemMsg(data.username + ' غادر الغرفة');
    });
    socket.on('play', (data) => {
      if (!videoEl || isSyncing) return;
      isSyncing = true; setSyncStatus('syncing');
      videoEl.currentTime = data.time; videoEl.play().catch(()=>{});
      setTimeout(() => { isSyncing = false; setSyncStatus('synced'); }, 800);
    });
    socket.on('pause', (data) => {
      if (!videoEl || isSyncing) return;
      isSyncing = true; setSyncStatus('syncing');
      videoEl.currentTime = data.time; videoEl.pause();
      setTimeout(() => { isSyncing = false; setSyncStatus('synced'); }, 800);
    });
    socket.on('seek', (data) => {
      if (!videoEl || isSyncing) return;
      isSyncing = true; setSyncStatus('syncing');
      videoEl.currentTime = data.time;
      setTimeout(() => { isSyncing = false; setSyncStatus('synced'); }, 600);
    });
    socket.on('sync-time', (data) => {
      if (!videoEl || myRole === 'host') return;
      videoEl.currentTime = data.time;
      if (data.playing) videoEl.play().catch(()=>{}); else videoEl.pause();
    });
    socket.on('chat-message', (data) => {
      if (data.username !== myUsername) addChatMsg(data.username, data.text, false);
    });
  } catch(e) {
    showToast('وضع محلي — بدون مزامنة');
  }
}

// ════ VIDEO ════
function initVideo() {
  videoEl = document.getElementById('video-player');
  setupVideoEvents();
  if (!videoUrl) return;
  const isMagnet = videoUrl.startsWith('magnet:');
  const isTorrent = videoUrl.endsWith('.torrent');
  if (isMagnet || isTorrent) loadTorrent(videoUrl); else loadDirectVideo(videoUrl);
}

function loadDirectVideo(url) {
  showLoading('جاري تحميل الفيديو...');
  videoEl.src = url; videoEl.load();
  videoEl.addEventListener('canplay', () => { hideLoading(); showVideoPlayer(); }, { once: true });
  videoEl.addEventListener('error',   () => { hideLoading(); document.getElementById('placeholder-text').textContent = 'تعذر تحميل الفيديو — تأكد من الرابط.'; }, { once: true });
}

function loadTorrent(magnetOrUrl) {
  if (typeof WebTorrent === 'undefined') {
    document.getElementById('placeholder-text').textContent = 'WebTorrent غير متاح. استخدم رابطاً مباشراً.';
    return;
  }
  showLoading('جاري الاتصال بشبكة التورنت...');
  torrentClient = new WebTorrent();
  torrentClient.add(magnetOrUrl, (torrent) => {
    const file = torrent.files.find(f => /\.(mp4|mkv|avi|webm|mov|m4v)$/i.test(f.name));
    if (!file) { hideLoading(); document.getElementById('placeholder-text').textContent = 'لم يتم العثور على ملف فيديو.'; return; }
    showLoading('جاري التحميل: ' + file.name);
    torrent.on('download', () => {
      const pct = Math.round(torrent.progress * 100);
      const spd = (torrent.downloadSpeed / 1024).toFixed(0);
      document.getElementById('loading-progress').textContent = pct + '% — ' + spd + ' KB/s — ' + torrent.numPeers + ' peers';
      if (pct >= 2) { hideLoading(); showVideoPlayer(); }
    });
    file.renderTo(videoEl, { autoplay: false }, (err) => {
      if (err) { hideLoading(); document.getElementById('placeholder-text').textContent = 'خطأ في تشغيل الملف.'; }
      else { hideLoading(); showVideoPlayer(); }
    });
  });
  torrentClient.on('error', (err) => { hideLoading(); document.getElementById('placeholder-text').textContent = 'خطأ في التورنت: ' + err.message; });
}

function showVideoPlayer() {
  document.getElementById('player-placeholder').style.display = 'none';
  videoEl.style.display = 'block';
}
function showLoading(msg) {
  document.getElementById('loading-overlay').classList.remove('hidden');
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading-progress').textContent = '';
}
function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }

function setupVideoEvents() {
  if (!videoEl) return;
  videoEl.addEventListener('timeupdate', () => {
    if (!videoEl.duration) return;
    const pct = (videoEl.currentTime / videoEl.duration) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('time-display').textContent = formatTime(videoEl.currentTime) + ' / ' + formatTime(videoEl.duration);
  });
  videoEl.addEventListener('play',  () => updatePlayBtn(true));
  videoEl.addEventListener('pause', () => updatePlayBtn(false));
}

function updatePlayBtn(playing) {
  document.getElementById('play-pause-btn').innerHTML = playing
    ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
    : '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';
}

// ════ CONTROLS ════
function startVideo() {
  if (!videoEl || !videoUrl) return;
  if (videoEl.paused) {
    videoEl.play().catch(()=>{});
    if (socket && socket.connected) socket.emit('play', { room: currentRoom, time: videoEl.currentTime });
  }
}
function togglePlay() {
  if (!videoEl) return;
  if (videoEl.paused) {
    videoEl.play().catch(()=>{});
    if (socket && socket.connected) socket.emit('play', { room: currentRoom, time: videoEl.currentTime });
  } else {
    videoEl.pause();
    if (socket && socket.connected) socket.emit('pause', { room: currentRoom, time: videoEl.currentTime });
  }
}
function seekVideo(e) {
  if (!videoEl || !videoEl.duration) return;
  const rect = document.getElementById('progress-wrap').getBoundingClientRect();
  const t = Math.max(0, Math.min((e.clientX - rect.left) / rect.width, 1)) * videoEl.duration;
  videoEl.currentTime = t;
  if (socket && socket.connected) socket.emit('seek', { room: currentRoom, time: t });
}
function toggleMute() {
  if (!videoEl) return;
  videoEl.muted = !videoEl.muted;
  document.getElementById('volume-icon').style.opacity = videoEl.muted ? '0.25' : '1';
}
function setVolume(v) { if (videoEl) videoEl.volume = v; }
function toggleFullscreen() {
  const w = document.querySelector('.player-wrapper');
  if (!document.fullscreenElement) w.requestFullscreen().catch(()=>{}); else document.exitFullscreen();
}
function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

// ════ SYNC STATUS ════
function setSyncStatus(status) {
  const badge = document.getElementById('sync-badge');
  const text  = document.getElementById('sync-text');
  if (status === 'synced') { badge.className = 'sync-badge synced'; text.textContent = 'متزامن'; }
  else                     { badge.className = 'sync-badge syncing'; text.textContent = 'مزامنة...'; }
}

// ════ CHAT ════
function toggleChat() {
  const panel = document.getElementById('chat-panel');
  const btn   = document.getElementById('chat-toggle');
  chatOpen    = panel.classList.contains('hidden');
  if (chatOpen) {
    panel.classList.remove('hidden'); panel.classList.remove('faded');
    btn.className = 'chat-toggle open';
    btn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>';
    startChatFade();
    unreadCount = 0;
    document.getElementById('unread-badge').classList.add('hidden');
  } else {
    panel.classList.add('hidden');
    btn.className = 'chat-toggle closed';
    btn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
  }
}
function startChatFade() {
  clearTimeout(chatFadeTimer);
  chatFadeTimer = setTimeout(() => {
    const panel = document.getElementById('chat-panel');
    if (!panel.classList.contains('hidden')) panel.classList.add('faded');
  }, 4000);
}
function resetChatFade() {
  document.getElementById('chat-panel').classList.remove('faded');
  startChatFade();
}
function sendChat() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  addChatMsg(myUsername || 'أنا', text, true);
  resetChatFade();
  if (socket && socket.connected) socket.emit('chat-message', { room: currentRoom, username: myUsername, text });
}
function addChatMsg(username, text, isMine) {
  const container = document.getElementById('chat-messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  wrap.innerHTML = '<div class="msg-meta"><span class="msg-user">' + username + '</span><span class="msg-time">' + time + '</span></div><div class="msg-bubble ' + (isMine ? 'mine' : 'other') + '">' + text + '</div>';
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
  if (!isMine) {
    const panel = document.getElementById('chat-panel');
    if (panel.classList.contains('hidden')) {
      unreadCount++;
      const badge = document.getElementById('unread-badge');
      badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
      badge.classList.remove('hidden');
    } else {
      resetChatFade();
    }
  }
}
function addSystemMsg(text) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg-system';
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ════ TOAST ════
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add('hidden'), 3000);
}

// ════ KEYBOARD ════
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'KeyF')  toggleFullscreen();
  if (e.code === 'KeyM')  toggleMute();
  if (e.code === 'KeyC')  toggleChat();
});
document.addEventListener('touchstart', () => {
  const panel = document.getElementById('chat-panel');
  if (panel && !panel.classList.contains('hidden')) resetChatFade();
});
</script>
</body>
</html>
