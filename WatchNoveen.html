<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WatchNoveen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #6c63ff;
      --accent-90: rgba(108,99,255,0.9);
      --accent-40: rgba(108,99,255,0.4);
      --accent-20: rgba(108,99,255,0.2);
      --accent-10: rgba(108,99,255,0.1);
      --accent-5:  rgba(108,99,255,0.05);
      --bg:        #0a0a0a;
      --card:      #141414;
      --card-40:   rgba(20,20,20,0.4);
      --white-60:  rgba(255,255,255,0.6);
      --white-40:  rgba(255,255,255,0.4);
      --white-20:  rgba(255,255,255,0.2);
      --white-10:  rgba(255,255,255,0.1);
      --white-5:   rgba(255,255,255,0.05);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
      overflow-x: hidden;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--white-20); border-radius: 4px; }

    /* ── Glass ── */
    .glass {
      background: var(--card-40);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--white-10);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 1px 0 var(--white-5);
    }

    .glass-input {
      background: var(--white-5);
      border: 1px solid var(--white-10);
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.3s;
      width: 100%;
    }
    .glass-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-20);
    }
    .glass-input::placeholder { color: var(--white-40); font-family: 'Noto Sans Arabic', sans-serif; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      padding: 12px 32px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 32px var(--accent-40);
      font-family: 'Noto Sans Arabic', sans-serif;
      font-size: 15px;
    }
    .btn-primary:hover { background: var(--accent-90); box-shadow: 0 8px 40px var(--accent); transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      background: var(--card-40);
      backdrop-filter: blur(24px);
      color: #fff;
      font-weight: 500;
      padding: 12px 32px;
      border-radius: 12px;
      border: 1px solid var(--white-10);
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Noto Sans Arabic', sans-serif;
      font-size: 15px;
    }
    .btn-secondary:hover { background: var(--white-10); }
    .btn-secondary:active { transform: scale(0.97); }

    /* ── Particles ── */
    #particles {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent-20);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0); }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-100vh); }
    }

    /* ── Screens ── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; z-index: 10;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    .screen.hidden { display: none; }

    /* ── Landing ── */
    .logo-wrap { position: relative; text-align: center; margin-bottom: 48px; }
    .logo-glow {
      position: absolute; inset: -20px;
      background: radial-gradient(ellipse, var(--accent-40) 0%, transparent 70%);
      filter: blur(32px); pointer-events: none;
    }
    .logo-text {
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 900; letter-spacing: -3px;
      line-height: 1; position: relative;
    }
    .logo-text span { color: var(--accent); }
    .logo-tagline {
      margin-top: 20px; font-size: clamp(16px, 3vw, 22px);
      color: var(--white-60); font-family: 'Noto Sans Arabic', sans-serif;
      font-weight: 500;
    }
    .landing-btns {
      display: flex; gap: 16px; width: 100%; max-width: 420px;
      flex-wrap: wrap;
    }
    .landing-btns button { flex: 1; min-width: 140px; display: flex; align-items: center; justify-content: center; gap: 8px; }

    /* ── Form screens ── */
    .form-card {
      width: 100%; max-width: 440px;
      border-radius: 24px; padding: 32px;
    }
    .form-card h2 {
      font-size: 22px; font-weight: 700; text-align: center;
      margin-bottom: 28px; font-family: 'Noto Sans Arabic', sans-serif;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 12px; color: var(--white-40);
      margin-bottom: 8px; font-family: 'Noto Sans Arabic', sans-serif;
      padding: 0 4px;
    }
    .code-display {
      display: flex; gap: 8px; align-items: center;
    }
    .code-box {
      flex: 1; text-align: center; font-family: 'Inter', monospace;
      font-size: 24px; letter-spacing: 6px; font-weight: 700;
      padding: 14px; border-radius: 12px;
      background: var(--accent-5); border: 2px dashed rgba(108,99,255,0.3);
      color: var(--accent);
    }
    .copy-btn {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--card-40); border: 1px solid var(--white-10);
      color: #fff; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: all 0.3s; flex-shrink: 0;
      backdrop-filter: blur(24px);
    }
    .copy-btn:hover { background: var(--accent); }
    .back-link {
      display: block; text-align: center; margin-top: 16px;
      color: var(--white-40); font-size: 13px; cursor: pointer;
      transition: color 0.2s; font-family: 'Noto Sans Arabic', sans-serif;
      background: none; border: none;
    }
    .back-link:hover { color: #fff; }

    /* ── Watch Screen ── */
    #watch-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      z-index: 10; padding: 0;
      animation: fadeIn 0.4s ease;
    }
    #watch-screen.hidden { display: none; }

    .topbar {
      border-top: none; border-left: none; border-right: none;
      border-radius: 0; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-brand { display: flex; align-items: center; gap: 12px; }
    .topbar-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--accent-20); border: 1px solid rgba(108,99,255,0.3);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .topbar-title { font-weight: 700; font-size: 13px; opacity: 0.8; }
    .live-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; text-transform: uppercase; font-weight: 700; color: var(--white-40);
    }
    .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .sync-badge {
      padding: 4px 12px; border-radius: 999px; font-size: 10px;
      font-weight: 700; text-transform: uppercase; display: flex;
      align-items: center; gap: 6px; transition: all 0.3s;
    }
    .sync-badge.synced { background: rgba(34,197,94,0.1); color: #22c55e; }
    .sync-badge.syncing { background: var(--accent-10); color: var(--accent); }
    .room-code-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px; border-radius: 10px; cursor: pointer;
      border: none; color: #fff; transition: all 0.2s;
      font-family: monospace; font-size: 13px; letter-spacing: 3px;
      color: var(--accent); font-weight: 700;
    }

    .player-area {
      flex: 1; padding: 12px 16px; display: flex;
      flex-direction: column; gap: 12px; overflow: hidden; min-height: 0;
    }
    .player-wrapper {
      flex: 1; border-radius: 24px; overflow: hidden;
      position: relative; min-height: 0;
    }
    .player-wrapper video {
      width: 100%; height: 100%; object-fit: contain; background: #000;
      display: block;
    }
    .player-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
    }
    .play-big-btn {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--accent-20); border: 1px solid rgba(108,99,255,0.3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.5s; backdrop-filter: blur(8px);
    }
    .play-big-btn:hover { background: var(--accent); transform: scale(1.1); }
    .placeholder-text { font-size: 14px; color: var(--white-40); font-family: 'Noto Sans Arabic', sans-serif; text-align: center; padding: 0 20px; }

    /* Controls */
    .controls-bar {
      border-radius: 16px; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .progress-wrap {
      width: 100%; height: 6px; background: var(--white-10);
      border-radius: 999px; overflow: hidden; cursor: pointer; position: relative;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 999px; transition: width 0.3s;
    }
    .controls-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .controls-left { display: flex; align-items: center; gap: 16px; }
    .controls-right { display: flex; align-items: center; gap: 14px; padding-right: 0; border-right: none; padding-left: 14px; border-left: 1px solid var(--white-10); }
    .ctrl-btn {
      background: none; border: none; color: rgba(255,255,255,0.6);
      cursor: pointer; display: flex; align-items: center;
      transition: color 0.2s; padding: 4px;
    }
    .ctrl-btn:hover { color: #fff; }
    .ctrl-btn svg { width: 20px; height: 20px; }
    .time-display { font-size: 12px; font-family: monospace; opacity: 0.6; white-space: nowrap; }
    .volume-wrap { display: flex; align-items: center; gap: 8px; }
    .volume-slider {
      width: 70px; height: 4px; background: var(--white-10);
      border-radius: 999px; appearance: none; -webkit-appearance: none;
      cursor: pointer; outline: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: #fff; cursor: pointer;
    }

    /* Loading */
    .loading-overlay {
      position: absolute; inset: 0; background: rgba(10,10,10,0.9);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px; z-index: 5; border-radius: 24px;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid var(--white-10); border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--white-60); font-family: 'Noto Sans Arabic', sans-serif; text-align: center; }
    .loading-progress { font-size: 11px; color: var(--accent); font-family: monospace; }

    /* ── Floating Chat ── */
    #chat-container {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      display: flex; flex-direction: column; align-items: flex-end; gap: 12px;
    }
    #chat-panel {
      width: 300px; height: 420px; border-radius: 24px;
      padding: 16px; display: flex; flex-direction: column;
      transform-origin: bottom right;
      transition: opacity 0.4s, transform 0.3s;
    }
    #chat-panel.hidden { display: none; }
    #chat-panel.faded { opacity: 0.2; }

    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; padding-bottom: 10px;
      border-bottom: 1px solid var(--white-10);
    }
    .chat-header-title { font-weight: 700; font-size: 13px; font-family: 'Noto Sans Arabic', sans-serif; }
    .online-indicator { display: flex; align-items: center; gap: 6px; }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
    .online-count { font-size: 10px; font-weight: 700; color: var(--white-40); }

    .chat-messages {
      flex: 1; overflow-y: auto; display: flex;
      flex-direction: column; gap: 12px; padding-left: 4px;
      direction: rtl;
    }
    .msg-system {
      text-align: center; font-size: 11px; color: var(--white-40);
      font-family: 'Noto Sans Arabic', sans-serif;
    }
    .msg-wrap { display: flex; flex-direction: column; gap: 4px; }
    .msg-meta { display: flex; align-items: center; gap: 6px; }
    .msg-user { font-size: 10px; font-weight: 700; color: var(--accent); }
    .msg-time { font-size: 8px; opacity: 0.3; }
    .msg-bubble {
      padding: 8px 12px; border-radius: 16px; font-size: 13px;
      max-width: 85%; word-break: break-word;
    }
    .msg-bubble.mine {
      background: var(--accent); color: #fff; border-top-right-radius: 4px;
      align-self: flex-start;
    }
    .msg-bubble.other {
      background: var(--white-5); border: 1px solid var(--white-10);
      border-top-left-radius: 4px; align-self: flex-end;
    }

    .chat-input-wrap { margin-top: 12px; display: flex; gap: 8px; }
    .chat-input {
      flex: 1; background: var(--white-5); border: 1px solid var(--white-10);
      border-radius: 12px; padding: 10px 14px; color: #fff;
      font-size: 13px; font-family: 'Noto Sans Arabic', sans-serif;
      outline: none; transition: all 0.3s; direction: rtl;
    }
    .chat-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-20); }
    .chat-input::placeholder { color: var(--white-40); }
    .send-btn {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      background: var(--accent); border: none; color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s;
    }
    .send-btn:hover { transform: scale(1.08); }

    .chat-toggle {
      width: 52px; height: 52px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; transition: all 0.3s;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .chat-toggle.open { background: #fff; color: var(--bg); transform: rotate(12deg); }
    .chat-toggle.closed { background: var(--accent); color: #fff; }
    .chat-toggle.closed:hover { transform: scale(1.1); }

    /* ── Toast ── */
    #toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: var(--card-40); backdrop-filter: blur(24px);
      border: 1px solid var(--white-10); border-radius: 12px;
      padding: 12px 24px; font-size: 13px; font-family: 'Noto Sans Arabic', sans-serif;
      z-index: 999; transition: opacity 0.4s; pointer-events: none;
      white-space: nowrap;
    }
    #toast.hidden { opacity: 0; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .landing-btns { flex-direction: column; }
      .form-card { padding: 24px 20px; }
      #chat-panel { width: 280px; height: 380px; }
      #chat-container { right: 12px; bottom: 12px; }
      .topbar { padding: 10px 14px; }
      .controls-bar { padding: 10px 12px; }
      .volume-wrap { display: none; }
      .topbar-title { display: none; }
    }

    /* SVG icons inline */
    svg { display: block; }
  </style>
</head>
<body>

<!-- Particles -->
<div id="particles"></div>

<!-- Toast -->
<div id="toast" class="hidden"></div>

<!-- ═══════════════ LANDING ═══════════════ -->
<div id="landing-screen" class="screen">
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="logo-text">Watch<span>Noveen</span></div>
    <p class="logo-tagline">شاهد مع من تحب، أينما كان</p>
  </div>
  <div class="landing-btns">
    <button class="btn-primary" onclick="goCreate()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      إنشاء غرفة
    </button>
    <button class="btn-secondary" onclick="goJoin()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      الانضمام لغرفة
    </button>
  </div>
  <div style="position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,0.15);letter-spacing:3px;text-transform:uppercase;">
    © 2026 WatchNoveen • Premium Sync Tech
  </div>
</div>

<!-- ═══════════════ CREATE ═══════════════ -->
<div id="create-screen" class="screen hidden">
  <div class="form-card glass">
    <h2>تجهيز الغرفة</h2>

    <div class="form-group">
      <label>كود الغرفة</label>
      <div class="code-display">
        <div class="code-box" id="room-code-display">------</div>
        <button class="copy-btn" onclick="copyCode()" title="نسخ">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label>اسمك</label>
      <input id="create-username" type="text" placeholder="أدخل اسمك هنا..." class="glass-input" />
    </div>

    <div class="form-group">
      <label>رابط الفيديو</label>
      <input id="create-url" type="text" placeholder="magnet link أو رابط الفيديو..." class="glass-input" dir="ltr" />
    </div>

    <button class="btn-primary" style="width:100%;margin-top:8px;justify-content:center;display:flex;align-items:center;gap:8px;" onclick="startWatching()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      ابدأ المشاهدة
    </button>

    <button class="back-link" onclick="goLanding()">العودة للخلف</button>
  </div>
</div>

<!-- ═══════════════ JOIN ═══════════════ -->
<div id="join-screen" class="screen hidden">
  <div class="form-card glass">
    <h2>انضمام للغرفة</h2>

    <div class="form-group">
      <label>كود الغرفة</label>
      <input id="join-code" type="text" placeholder="أدخل كود الغرفة المكون من 6 رموز" class="glass-input" style="text-align:center;font-family:monospace;letter-spacing:6px;font-size:18px;text-transform:uppercase;" maxlength="6" dir="ltr" />
    </div>

    <div class="form-group">
      <label>اسمك</label>
      <input id="join-username" type="text" placeholder="أدخل اسمك هنا..." class="glass-input" />
    </div>

    <button class="btn-primary" style="width:100%;margin-top:8px;justify-content:center;display:flex;align-items:center;gap:8px;" onclick="joinRoom()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      انضم الآن
    </button>

    <button class="back-link" onclick="goLanding()">العودة للخلف</button>
  </div>
</div>

<!-- ═══════════════ WATCH ═══════════════ -->
<div id="watch-screen" class="hidden">

  <!-- Top Bar -->
  <div class="topbar glass">
    <div class="topbar-brand">
      <div class="topbar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color:var(--accent)"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
      <div>
        <div class="topbar-title">WatchNoveen</div>
        <div class="live-dot">
          <div class="pulse-dot"></div>
          <span>Live Sync Active</span>
        </div>
      </div>
    </div>

    <div class="topbar-right">
      <div class="sync-badge synced" id="sync-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span id="sync-text">متزامن ✓</span>
      </div>
      <button class="room-code-btn glass" onclick="copyCode()" id="watch-room-code">
        <span id="watch-code-text">------</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
    </div>
  </div>

  <!-- Player Area -->
  <div class="player-area">
    <div class="player-wrapper glass">

      <!-- Loading overlay -->
      <div class="loading-overlay hidden" id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">جاري تحميل الفيديو...</div>
        <div class="loading-progress" id="loading-progress"></div>
      </div>

      <!-- Video element -->
      <video id="video-player" style="display:none;" playsinline></video>

      <!-- Placeholder -->
      <div class="player-placeholder" id="player-placeholder">
        <div class="play-big-btn" onclick="startVideo()">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
        <p class="placeholder-text" id="placeholder-text">جاري التحضير...</p>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-bar glass">
      <div class="progress-wrap" id="progress-wrap" onclick="seekVideo(event)">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="controls-row">
        <div class="controls-left">
          <button class="ctrl-btn" onclick="togglePlay()" id="play-pause-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
          <div class="volume-wrap">
            <button class="ctrl-btn" onclick="toggleMute()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="volume-icon"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)" />
          </div>
          <span class="time-display" id="time-display">0:00 / 0:00</span>
        </div>
        <div class="controls-right">
          <button class="ctrl-btn" onclick="toggleFullscreen()" title="ملء الشاشة">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ═══════════════ FLOATING CHAT ═══════════════ -->
<div id="chat-container" style="display:none;">
  <div id="chat-panel" class="glass hidden">
    <div class="chat-header">
      <span class="chat-header-title">الدردشة العامة</span>
      <div class="online-indicator">
        <div class="online-dot"></div>
        <span class="online-count" id="online-count">1 ONLINE</span>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-wrap">
      <input type="text" id="chat-input" class="chat-input" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter')sendChat()" onfocus="resetChatFade()" />
      <button class="send-btn" onclick="sendChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transform:rotate(210deg) translateX(-1px)"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
  <button class="chat-toggle closed" id="chat-toggle" onclick="toggleChat()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </button>
</div>

<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let currentRoom = null;
let myUsername = '';
let myRole = ''; // 'host' | 'guest'
let videoUrl = '';
let socket = null;
let torrentClient = null;
let videoEl = null;
let isSyncing = false;
let chatFadeTimer = null;
let onlineUsers = 1;

// ═══════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════
(function() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 4;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      bottom:-10px;
      animation-duration:${10 + Math.random()*20}s;
      animation-delay:${Math.random()*10}s;
      opacity:0;
    `;
    container.appendChild(p);
  }
})();

// ═══════════════════════════════════════════════
//  SCREEN NAVIGATION
// ═══════════════════════════════════════════════
function showScreen(id) {
  ['landing-screen','create-screen','join-screen'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById('watch-screen').classList.add('hidden');
  document.getElementById('chat-container').style.display = 'none';

  if (id === 'watch') {
    document.getElementById('watch-screen').classList.remove('hidden');
    document.getElementById('chat-container').style.display = 'flex';
  } else {
    document.getElementById(id + '-screen').classList.remove('hidden');
  }
}

function goLanding() { showScreen('landing'); }
function goCreate() {
  const code = generateCode();
  currentRoom = code;
  document.getElementById('room-code-display').textContent = code;
  showScreen('create');
}
function goJoin() { showScreen('join'); }

// ═══════════════════════════════════════════════
//  GENERATE CODE
// ═══════════════════════════════════════════════
function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let r = '';
  for (let i = 0; i < 6; i++) r += chars[Math.floor(Math.random() * chars.length)];
  return r;
}

// ═══════════════════════════════════════════════
//  COPY CODE
// ═══════════════════════════════════════════════
function copyCode() {
  if (currentRoom) {
    navigator.clipboard.writeText(currentRoom).catch(() => {});
    showToast('تم نسخ كود الغرفة: ' + currentRoom);
  }
}

// ═══════════════════════════════════════════════
//  START WATCHING (HOST)
// ═══════════════════════════════════════════════
function startWatching() {
  const username = document.getElementById('create-username').value.trim();
  const url = document.getElementById('create-url').value.trim();
  if (!username) { showToast('الرجاء إدخال اسمك'); return; }
  if (!url) { showToast('الرجاء إدخال رابط الفيديو'); return; }

  myUsername = username;
  myRole = 'host';
  videoUrl = url;

  document.getElementById('watch-code-text').textContent = currentRoom;
  showScreen('watch');
  addSystemMsg('أهلاً بك يا ' + myUsername + '! الغرفة جاهزة.');
  addSystemMsg('كود الغرفة: ' + currentRoom + ' — شاركه مع صديقك');

  initSocket();
  initVideo();
}

// ═══════════════════════════════════════════════
//  JOIN ROOM (GUEST)
// ═══════════════════════════════════════════════
function joinRoom() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const username = document.getElementById('join-username').value.trim();
  if (!code || code.length < 6) { showToast('الرجاء إدخال كود الغرفة'); return; }
  if (!username) { showToast('الرجاء إدخال اسمك'); return; }

  myUsername = username;
  myRole = 'guest';
  currentRoom = code;

  document.getElementById('watch-code-text').textContent = currentRoom;
  showScreen('watch');
  addSystemMsg('انضممت للغرفة ' + currentRoom);
  document.getElementById('placeholder-text').textContent = 'في انتظار رابط الفيديو من المضيف...';

  initSocket();
}

// ═══════════════════════════════════════════════
//  SOCKET.IO — المزامنة الحقيقية
//  ملاحظة: عند النشر على Render، غيّر SERVER_URL
// ═══════════════════════════════════════════════
const SERVER_URL = 'https://watchnoveen-server.onrender.com';

function initSocket() {
  try {
    socket = io(SERVER_URL, {
      transports: ['websocket', 'polling'],
      timeout: 8000,
      reconnectionAttempts: 5
    });

    socket.on('connect', () => {
      socket.emit('join-room', { room: currentRoom, username: myUsername, role: myRole, videoUrl });
      showToast('متصل بالسيرفر ✓');
    });

    socket.on('connect_error', () => {
      // وضع محلي — للتجربة بدون سيرفر
      showToast('وضع محلي — بدون مزامنة حقيقية');
    });

    socket.on('room-state', (data) => {
      onlineUsers = data.users || 1;
      document.getElementById('online-count').textContent = onlineUsers + ' ONLINE';
      if (data.videoUrl && !videoUrl) {
        videoUrl = data.videoUrl;
        initVideo();
      }
    });

    socket.on('user-joined', (data) => {
      onlineUsers++;
      document.getElementById('online-count').textContent = onlineUsers + ' ONLINE';
      addSystemMsg(data.username + ' انضم للغرفة! 🎉');
      showToast(data.username + ' انضم للغرفة!');
      // المضيف يرسل وقت الفيديو الحالي
      if (myRole === 'host' && videoEl) {
        socket.emit('sync-time', { room: currentRoom, time: videoEl.currentTime, playing: !videoEl.paused });
      }
    });

    socket.on('user-left', (data) => {
      onlineUsers = Math.max(1, onlineUsers - 1);
      document.getElementById('online-count').textContent = onlineUsers + ' ONLINE';
      addSystemMsg(data.username + ' غادر الغرفة');
    });

    socket.on('play', (data) => {
      if (!videoEl) return;
      setSyncStatus('syncing');
      videoEl.currentTime = data.time;
      videoEl.play().catch(() => {});
      setTimeout(() => setSyncStatus('synced'), 800);
    });

    socket.on('pause', (data) => {
      if (!videoEl) return;
      setSyncStatus('syncing');
      videoEl.currentTime = data.time;
      videoEl.pause();
      setTimeout(() => setSyncStatus('synced'), 800);
    });

    socket.on('seek', (data) => {
      if (!videoEl) return;
      setSyncStatus('syncing');
      videoEl.currentTime = data.time;
      setTimeout(() => setSyncStatus('synced'), 600);
    });

    socket.on('sync-time', (data) => {
      if (!videoEl || myRole === 'host') return;
      videoEl.currentTime = data.time;
      if (data.playing) videoEl.play().catch(() => {});
      else videoEl.pause();
    });

    socket.on('chat-message', (data) => {
      if (data.username !== myUsername) {
        addChatMsg(data.username, data.text, false);
      }
    });

  } catch(e) {
    showToast('وضع محلي — للتجربة فقط');
  }
}

// ═══════════════════════════════════════════════
//  VIDEO — WebTorrent أو رابط مباشر
// ═══════════════════════════════════════════════
function initVideo() {
  videoEl = document.getElementById('video-player');
  setupVideoEvents();

  if (!videoUrl) return;

  const isMagnet = videoUrl.startsWith('magnet:');
  const isTorrent = videoUrl.endsWith('.torrent');

  if (isMagnet || isTorrent) {
    loadTorrent(videoUrl);
  } else {
    loadDirectVideo(videoUrl);
  }
}

function loadDirectVideo(url) {
  showLoading('جاري تحميل الفيديو...');
  videoEl.src = url;
  videoEl.load();
  videoEl.addEventListener('canplay', () => {
    hideLoading();
    showVideoPlayer();
  }, { once: true });
  videoEl.addEventListener('error', () => {
    hideLoading();
    document.getElementById('placeholder-text').textContent = 'تعذر تحميل الفيديو. تأكد من الرابط.';
  }, { once: true });
}

function loadTorrent(magnetOrUrl) {
  if (typeof WebTorrent === 'undefined') {
    showToast('WebTorrent غير متاح في هذا المتصفح');
    document.getElementById('placeholder-text').textContent = 'WebTorrent غير متاح. استخدم رابط مباشر.';
    return;
  }

  showLoading('جاري الاتصال بشبكة التورنت...');
  torrentClient = new WebTorrent();

  torrentClient.add(magnetOrUrl, (torrent) => {
    const file = torrent.files.find(f =>
      f.name.match(/\.(mp4|mkv|avi|webm|mov|m4v)$/i)
    );

    if (!file) {
      hideLoading();
      document.getElementById('placeholder-text').textContent = 'لم يتم العثور على ملف فيديو في هذا التورنت';
      return;
    }

    showLoading('جاري تحميل: ' + file.name);

    torrent.on('download', () => {
      const pct = Math.round(torrent.progress * 100);
      const speed = (torrent.downloadSpeed / 1024).toFixed(0);
      document.getElementById('loading-progress').textContent =
        pct + '% — ' + speed + ' KB/s — ' + torrent.numPeers + ' peers';
      if (pct >= 2) {
        hideLoading();
        showVideoPlayer();
      }
    });

    file.renderTo(videoEl, { autoplay: false }, (err) => {
      if (err) {
        hideLoading();
        document.getElementById('placeholder-text').textContent = 'خطأ في تشغيل الملف';
      } else {
        hideLoading();
        showVideoPlayer();
      }
    });
  });

  torrentClient.on('error', (err) => {
    hideLoading();
    document.getElementById('placeholder-text').textContent = 'خطأ في التورنت: ' + err.message;
  });
}

function showVideoPlayer() {
  document.getElementById('player-placeholder').style.display = 'none';
  videoEl.style.display = 'block';
}

function showLoading(msg) {
  document.getElementById('loading-overlay').classList.remove('hidden');
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading-progress').textContent = '';
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.add('hidden');
}

// ═══════════════════════════════════════════════
//  VIDEO EVENTS
// ═══════════════════════════════════════════════
function setupVideoEvents() {
  if (!videoEl) return;

  videoEl.addEventListener('timeupdate', () => {
    if (!videoEl.duration) return;
    const pct = (videoEl.currentTime / videoEl.duration) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('time-display').textContent =
      formatTime(videoEl.currentTime) + ' / ' + formatTime(videoEl.duration);
  });

  videoEl.addEventListener('play', () => updatePlayBtn(true));
  videoEl.addEventListener('pause', () => updatePlayBtn(false));
}

function updatePlayBtn(playing) {
  const btn = document.getElementById('play-pause-btn');
  btn.innerHTML = playing
    ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
    : `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>`;
}

// ═══════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════
function startVideo() {
  if (!videoEl || !videoUrl) return;
  if (videoEl.paused) {
    videoEl.play().catch(() => {});
    if (socket && socket.connected) {
      socket.emit('play', { room: currentRoom, time: videoEl.currentTime });
    }
  }
}

function togglePlay() {
  if (!videoEl) return;
  if (videoEl.paused) {
    videoEl.play().catch(() => {});
    if (socket && socket.connected) socket.emit('play', { room: currentRoom, time: videoEl.currentTime });
  } else {
    videoEl.pause();
    if (socket && socket.connected) socket.emit('pause', { room: currentRoom, time: videoEl.currentTime });
  }
}

function seekVideo(e) {
  if (!videoEl || !videoEl.duration) return;
  const wrap = document.getElementById('progress-wrap');
  const rect = wrap.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const newTime = pct * videoEl.duration;
  videoEl.currentTime = newTime;
  if (socket && socket.connected) socket.emit('seek', { room: currentRoom, time: newTime });
}

function toggleMute() {
  if (!videoEl) return;
  videoEl.muted = !videoEl.muted;
  document.getElementById('volume-icon').style.opacity = videoEl.muted ? '0.3' : '1';
}

function setVolume(v) {
  if (!videoEl) return;
  videoEl.volume = v;
}

function toggleFullscreen() {
  const wrapper = document.querySelector('.player-wrapper');
  if (!document.fullscreenElement) {
    wrapper.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ═══════════════════════════════════════════════
//  SYNC STATUS
// ═══════════════════════════════════════════════
function setSyncStatus(status) {
  const badge = document.getElementById('sync-badge');
  const text = document.getElementById('sync-text');
  if (status === 'synced') {
    badge.className = 'sync-badge synced';
    text.textContent = 'متزامن ✓';
  } else {
    badge.className = 'sync-badge syncing';
    text.textContent = 'جاري المزامنة...';
  }
}

// ═══════════════════════════════════════════════
//  CHAT
// ═══════════════════════════════════════════════
function toggleChat() {
  const panel = document.getElementById('chat-panel');
  const btn = document.getElementById('chat-toggle');
  const isOpen = !panel.classList.contains('hidden');

  if (isOpen) {
    panel.classList.add('hidden');
    btn.className = 'chat-toggle closed';
    btn.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
  } else {
    panel.classList.remove('hidden');
    panel.classList.remove('faded');
    btn.className = 'chat-toggle open';
    btn.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>`;
    startChatFade();
  }
}

function startChatFade() {
  clearTimeout(chatFadeTimer);
  chatFadeTimer = setTimeout(() => {
    const panel = document.getElementById('chat-panel');
    if (!panel.classList.contains('hidden')) panel.classList.add('faded');
  }, 3000);
}

function resetChatFade() {
  const panel = document.getElementById('chat-panel');
  panel.classList.remove('faded');
  startChatFade();
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addChatMsg(myUsername || 'أنا', text, true);
  resetChatFade();
  if (socket && socket.connected) {
    socket.emit('chat-message', { room: currentRoom, username: myUsername, text });
  }
}

function addChatMsg(username, text, isMine) {
  const container = document.getElementById('chat-messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  wrap.innerHTML = `
    <div class="msg-meta">
      <span class="msg-user">${username}</span>
      <span class="msg-time">${time}</span>
    </div>
    <div class="msg-bubble ${isMine ? 'mine' : 'other'}">${text}</div>
  `;
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;

  // إظهار اللوحة تلقائياً عند وصول رسالة جديدة
  const panel = document.getElementById('chat-panel');
  if (!isMine && panel.classList.contains('hidden')) {
    toggleChat();
  }
}

function addSystemMsg(text) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg-system';
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add('hidden'), 3000);
}

// ═══════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'KeyF') toggleFullscreen();
  if (e.code === 'KeyM') toggleMute();
});

// Touch: reset chat fade on touch
document.addEventListener('touchstart', () => {
  const panel = document.getElementById('chat-panel');
  if (panel && !panel.classList.contains('hidden')) {
    panel.classList.remove('faded');
    startChatFade();
  }
});
</script>
</body>
</html>
